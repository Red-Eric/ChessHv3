<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChessHv3 Settings</title>
  <style>
    /* Global Styles */
    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, sans-serif;
      background-color: #0d1117; /* noir sombre */
      color: #00ff99; /* vert clair */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .container {
      background-color: #111827; /* noir/gris très sombre */
      border-radius: 10px;
      padding: 2rem;
      max-width: 400px;
      width: 100%;
      border: 1px solid #00ff99; /* bord vert */
      box-sizing: border-box;
    }

    h1 {
      text-align: center;
      margin-bottom: 2rem;
      font-size: 1.8rem;
      font-weight: bold;
      color: #00ff99;
    }

    .setting {
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
      font-weight: 500;
    }

    label {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .value-span {
      font-weight: bold;
      color: #00ff99;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      margin-top: 0.5rem;
      -webkit-appearance: none;
      background: #222; /* track sombre */
      border-radius: 3px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #00ff99; /* vert clair */
      cursor: pointer;
      border: none;
    }

    /* Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
      margin-top: 0.5rem;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #222;
      transition: 0.3s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 2px;
      bottom: 2px;
      background-color: #00ff99;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #004d33; /* vert foncé */
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }

    /* Button */
    button {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 6px;
      background-color: #00ff99;
      color: #0d1117;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      margin-top: 1rem;
    }

    button:hover {
      background-color: #00cc7a;
    }

    .description {
      font-size: 0.8rem;
      color: #00ff99;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ChessHv3 Settings</h1>

    <!-- Skill Level -->
    <div class="setting">
      <label for="elo"><span id="eloValue">Skill: 20 (3500 Elo)</span></label>
      <input type="range" id="elo" min="0" max="20" value="20" step="1">
    </div>

    <!-- Lines -->
    <div class="setting">
      <label for="lines">Lines: <span id="linesValue">3</span></label>
      <input type="range" id="lines" min="1" max="5" value="3" step="1">
    </div>

    <!-- Depth -->
    <div class="setting">
      <label for="depth">Depth: <span id="depthValue">10</span></label>
      <input type="range" id="depth" min="1" max="15" value="10" step="1">
    </div>

    <!-- Auto Skill Adjustment Toggle -->
    <div class="setting">
      <span id="autoSkillLabel">Auto Skill Adjustment (OFF)</span>
      <label class="switch">
        <input type="checkbox" id="autoSkill">
        <span class="slider"></span>
      </label>
      <div class="description">Doesn't work with "Only Show Winning Move"</div>
    </div>

    <!-- Only Show Winning Move Toggle -->
    <div class="setting">
      <span id="winningMoveLabel">Only Show Winning Move (OFF)</span>
      <label class="switch">
        <input type="checkbox" id="winningMove">
        <span class="slider"></span>
      </label>
      <div class="description">Shows only moves that give +2 material or checkmates</div>
    </div>

    <button id="save">Save Settings</button>
  </div>

  <script src="index.js"></script>
</body>
</html>

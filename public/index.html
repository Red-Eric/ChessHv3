<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChessHv3 Settings</title>
    <style>
      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      body {
        min-height: 100vh;
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #d1fae5;
        background: linear-gradient(270deg, #111827, #1f2937, #000000, #111827);
        background-size: 800% 800%;
        animation: gradientShift 30s ease infinite;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0.5rem;
      }

      .container {
        width: 100%;
        min-width: 375px; /* largeur iPhone */
        background: linear-gradient(135deg, #1f2937cc, #111827cc);
        border: 1px solid rgba(5, 150, 105, 0.35);
        border-radius: 1rem;
        padding: 1rem;
        box-shadow: 0 10px 20px rgba(16, 185, 129, 0.15);
        backdrop-filter: blur(10px);
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 1rem;
        text-align: center;
        color: #34d399;
        animation: pulseGlow 3s ease-in-out infinite;
      }

      @keyframes pulseGlow {
        0%, 100% { text-shadow: 0 0 8px #22c55e, 0 0 16px #10b981; }
        50% { text-shadow: 0 0 14px #34d399, 0 0 20px #22c55e; }
      }

      .setting { margin-bottom: 1rem; }

      label {
        display: block;
        margin-bottom: 0.4rem;
        font-weight: 600;
      }

      .value-span { font-weight: 700; color: #4ade80; }

      input[type="range"] {
        width: 100%;
        appearance: none;
        height: 6px;
        border-radius: 5px;
        background: #065f46;
        outline: none;
        cursor: pointer;
        box-shadow: inset 0 0 5px #10b981cc;
      }

      input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 20px;
        height: 20px;
        background: #34d399;
        border-radius: 50%;
        border: 2px solid #065f46;
        margin-top: -7px;
      }

      button {
        width: 100%;
        background-color: #059669;
        color: white;
        border: none;
        padding: 0.5rem;
        border-radius: 0.5rem;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>ChessHv3 Settings</h1>

      <!-- Skill Level -->
      <div class="setting">
        <label for="elo">
          <span id="eloValue">Skill: 20 (2500 Elo)</span>
        </label>
        <input type="range" id="elo" min="0" max="20" value="20" step="1" />
      </div>

      <!-- Lines -->
      <div class="setting">
        <label for="lines">Lines: <span id="linesValue">3</span></label>
        <input type="range" id="lines" min="1" max="5" value="3" step="1" />
      </div>

      <!-- Depth -->
      <div class="setting">
        <label for="depth">Depth: <span id="depthValue">10</span></label>
        <input type="range" id="depth" min="1" max="15" value="10" step="1" />
      </div>

      <button id="save">Save Settings</button>
    </div>

    <script src="index.js"></script>
  </body>
</html>
